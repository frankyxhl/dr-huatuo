name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check code_analyzer.py code_reporter.py dataset_annotator.py dataset_dedup.py quality_profile.py scoring_optimizer.py bugsinpy_extract.py bugsinpy_analysis.py cli.py example_code.py tests/
      - name: Format check
        run: ruff format --check code_analyzer.py code_reporter.py dataset_annotator.py dataset_dedup.py quality_profile.py scoring_optimizer.py bugsinpy_extract.py bugsinpy_analysis.py cli.py example_code.py tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install complexipy
      - name: Run tests
        run: pytest tests/ -v --tb=short
